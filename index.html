<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MajorNavi 学生专业测评系统</title>
  <meta name="description" content="MajorNavi 面向初高中学生的专业测评与升学规划系统，基于官方评分矩阵输出首选、次选与保底专业建议。">
  <script>
    if (location.protocol === "http:") {
      location.replace("https://" + location.host + location.pathname + location.search + location.hash);
    }
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="tag">MajorNavi · 初高中升学规划</p>
      <h1>学生专业测评系统</h1>
      <p class="subtitle">
        基于官方计分矩阵，结合兴趣、认知、能力与价值观，为学生和家长提供清晰的大学专业方向建议。
      </p>
      <p class="subtitle brand-subtitle">品牌域名：<strong>www.majornavi.cn</strong></p>
    </section>

    <section class="card" id="quiz-card">
      <div id="intro" class="intro">
        <h2>开始前说明</h2>
        <ul>
          <li>本工具用于规划参考，不代替专业心理咨询或招生决策。</li>
          <li>题目总数 110 道，每题四选一，请选择最符合你的选项。</li>
          <li>提交后会给出 3 个专业方向：首选、次选、末选（可冲刺/保底）。</li>
        </ul>
        <button id="start-btn" class="btn btn-primary">开始答题</button>
      </div>

      <form id="quiz-form" class="hidden">
        <div class="progress-wrap">
          <div class="progress-label">
            <span>答题进度</span>
            <span id="progress-text">0 / 24</span>
          </div>
          <div class="progress-bar">
            <div id="progress-fill"></div>
          </div>
          <p id="save-status" class="save-status">草稿未保存</p>
        </div>
        <div class="pager-meta">
          <span id="page-text">第 1 / 1 页</span>
          <button type="button" id="clear-btn" class="btn btn-ghost">清空作答</button>
        </div>
        <div id="question-list"></div>
        <div class="actions">
          <button type="button" id="prev-btn" class="btn btn-ghost">上一页</button>
          <button type="button" id="next-btn" class="btn btn-primary">下一页</button>
          <button type="submit" id="submit-btn" class="btn btn-primary hidden">生成推荐结果</button>
        </div>
      </form>

      <section id="result" class="hidden"></section>
    </section>
    <footer class="footer-links">
      <a href="./disclaimer.html" target="_blank" rel="noopener noreferrer">测评声明</a>
      <a href="./privacy.html" target="_blank" rel="noopener noreferrer">隐私说明与家长知情同意</a>
      <a href="./domain.html" target="_blank" rel="noopener noreferrer">自定义域名配置说明</a>
    </footer>
  </main>

  <script src="official_data.js"></script>
  <script src="analytics.js"></script>
  <script src="app.js"></script>
</body>
</html>
