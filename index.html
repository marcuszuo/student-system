<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MajorNavi 学生专业发展评估系统</title>
  <meta name="description" content="MajorNavi 面向初高中学生的专业发展评估与升学规划系统，基于多维画像与专业匹配模型输出专业方向建议。">
  <script>
    if (location.protocol === "http:") {
      location.replace("https://" + location.host + location.pathname + location.search + location.hash);
    }
  </script>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="tag">MajorNavi · 初高中升学规划</p>
      <h1>学生专业发展评估系统</h1>
      <p class="subtitle">
        基于多维画像模型，结合兴趣、认知、能力与价值偏好，为学生和家长提供更具参考价值的大学专业方向评估。
      </p>
      <p class="subtitle brand-subtitle">品牌域名：<strong>www.majornavi.cn</strong></p>
    </section>

    <section class="card" id="quiz-card">
      <section id="auth-gate" class="auth-gate">
        <div class="auth-card">
          <p class="auth-kicker">账号验证</p>
          <h2>登录后进入评估流程</h2>
          <p class="auth-copy">请输入账号信息，完成验证后即可进入专业发展评估流程。</p>
          <div class="auth-form">
            <label class="single-field">
              <span>用户名</span>
              <input id="auth-username" type="text" autocomplete="username" placeholder="请输入用户名">
            </label>
            <label class="single-field">
              <span>密码</span>
              <input id="auth-password" type="password" autocomplete="current-password" placeholder="请输入密码">
            </label>
            <div class="auth-actions">
              <button type="button" id="login-btn" class="btn btn-primary">登录并进入评估</button>
            </div>
            <p id="auth-status" class="auth-status">请输入用户名和密码</p>
          </div>
        </div>
      </section>

      <div id="assessment-shell" class="hidden">
        <div class="auth-session-bar">
          <span id="auth-session-text">已登录</span>
          <button type="button" id="logout-btn" class="btn btn-ghost btn-small">退出登录</button>
        </div>

        <div id="intro" class="intro">
          <section class="intro-panel" data-intro-step="1">
            <h3>选择学生类型与年级</h3>
            <div class="student-type-grid">
              <label class="type-card">
                <input type="radio" name="student-type" value="public" checked>
                <span>
                  <strong>公立学校学生</strong>
                </span>
              </label>
              <label class="type-card">
                <input type="radio" name="student-type" value="international">
                <span>
                  <strong>国际学生</strong>
                </span>
              </label>
            </div>
            <label class="single-field">
              <span>当前年级</span>
              <input id="student-grade" type="text" autocomplete="off" placeholder="如 高一、11年级、G10">
            </label>
            <div class="wizard-actions">
              <button type="button" id="intro-next-1" class="btn btn-primary">继续</button>
            </div>
          </section>

          <section class="intro-panel hidden" data-intro-step="2">
            <h3>补充学业信息</h3>
            <div id="public-score-panel" class="score-panel">
              <div class="subject-inputs">
                <p class="subject-title">公立学校成绩（建议尽量填写，0-100 分）</p>
                <label>语文<input id="score-cn" type="number" min="0" max="100" inputmode="numeric" autocomplete="off" placeholder="如 92"></label>
                <label>数学<input id="score-math" type="number" min="0" max="100" inputmode="numeric" autocomplete="off" placeholder="如 88"></label>
                <label>英语<input id="score-en" type="number" min="0" max="100" inputmode="numeric" autocomplete="off" placeholder="如 90"></label>
                <label>物理<input id="score-phy" type="number" min="0" max="100" inputmode="numeric" autocomplete="off" placeholder="如 85"></label>
                <label>化学<input id="score-chem" type="number" min="0" max="100" inputmode="numeric" autocomplete="off" placeholder="如 82"></label>
                <label>生物<input id="score-bio" type="number" min="0" max="100" inputmode="numeric" autocomplete="off" placeholder="如 84"></label>
              </div>
            </div>

            <div id="international-score-panel" class="score-panel hidden">
              <label class="single-field">
                <span>国际课程名称</span>
                <input id="international-curriculum-name" type="text" autocomplete="off" placeholder="如 A-Level、IB、AP、DSE、OSSD、IGCSE 或其他">
              </label>
              <label class="single-field">
                <span>课程与成绩</span>
                <textarea id="international-score-text" rows="7" placeholder="请按一行一门填写，支持中英文，例如：&#10;Mathematics A*&#10;Physics A&#10;Economics B&#10;或&#10;IB Math AA HL 6&#10;IB English A 5"></textarea>
              </label>
            </div>

            <div class="school-major-box">
              <label class="subject-title">目标学校专业范围（可选）</label>
              <div class="upload-row">
                <label class="btn btn-ghost upload-btn" for="school-major-file">上传 Excel/CSV/TXT</label>
                <input id="school-major-file" type="file" accept=".xlsx,.xls,.csv,.txt" hidden>
                <label class="btn btn-ghost upload-btn" for="school-major-image">上传图片识别</label>
                <input id="school-major-image" type="file" accept="image/*" hidden>
                <span id="school-major-file-status" class="upload-status">暂未上传文件</span>
              </div>
            </div>
            <div class="wizard-actions">
              <button type="button" id="intro-prev-2" class="btn btn-ghost">上一步</button>
              <button type="button" id="intro-next-2" class="btn btn-primary">继续</button>
            </div>
          </section>

          <section class="intro-panel hidden" data-intro-step="3">
            <h3>选择评估版本</h3>
            <div class="mode-picker">
              <label class="mode-item">
                <input type="radio" name="assessment-mode" value="standard" checked>
                标准版（核心评估 + 自动校准，约66题）
              </label>
              <label class="mode-item">
                <input type="radio" name="assessment-mode" value="full">
                完整版（110题）
              </label>
            </div>
            <div class="wizard-actions">
              <button type="button" id="intro-prev-3" class="btn btn-ghost">上一步</button>
              <button id="start-btn" type="button" class="btn btn-primary">开始评估</button>
            </div>
          </section>
        </div>

        <form id="quiz-form" class="hidden">
          <div class="progress-wrap">
            <div class="progress-label">
              <span>评估进度</span>
              <span id="progress-text">0 / 24</span>
            </div>
            <div class="progress-bar">
              <div id="progress-fill"></div>
            </div>
            <p id="save-status" class="save-status">当前未保存草稿</p>
            <p id="phase-hint" class="phase-hint hidden"></p>
          </div>
          <div class="pager-meta">
            <span id="page-text">第 1 / 1 页</span>
            <button type="button" id="clear-btn" class="btn btn-ghost">清空当前记录</button>
          </div>
          <div id="question-list"></div>
          <div class="actions">
            <button type="button" id="prev-btn" class="btn btn-ghost">上一页</button>
            <button type="button" id="next-btn" class="btn btn-primary">下一页</button>
            <button type="submit" id="submit-btn" class="btn btn-primary hidden">生成评估报告</button>
          </div>
        </form>

        <section id="result" class="hidden"></section>
      </div>
    </section>
    <footer class="footer-links">
      <a href="./pages/disclaimer.html" target="_blank" rel="noopener noreferrer">测评声明</a>
      <a href="./pages/privacy.html" target="_blank" rel="noopener noreferrer">隐私说明与家长知情同意</a>
      <a href="./pages/domain.html" target="_blank" rel="noopener noreferrer">自定义域名配置说明</a>
    </footer>
  </main>

  <script src="assets/js/official_data.js"></script>
  <script src="assets/js/majors_v2.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="assets/js/analytics.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
