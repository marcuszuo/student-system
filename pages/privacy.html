      <p>更新时间：2026-03-05</p>
      <p>当前版本默认会在浏览器本地暂存作答草稿（LocalStorage），用于断点续答；提交结果后草稿会自动清除。</p>
      <p>若站点已配置测评报告后台，学生提交后，系统会将测评报告、学生类型、年级、课程背景及推荐结果同步到后台，用于顾问查看与后续分析。</p>
      <p>系统默认不采集手机号、证件号等敏感身份信息。若后续接入更完整的账号系统或外部 CRM，请先补充隐私政策并取得监护人授权。</p>
      <p>未成年人使用本工具前，建议由监护人阅读本说明并知情同意。</p>
      <p>如需删除本地数据，可点击测评页“清空作答”，或在浏览器设置中清除本站点数据。</p>
