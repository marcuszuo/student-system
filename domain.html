<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自定义域名配置说明</title>
  <script>
    if (location.protocol === "http:") {
      location.replace("https://" + location.host + location.pathname + location.search + location.hash);
    }
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>自定义域名配置说明</h1>
      <p>1. 在仓库根目录创建 <code>CNAME</code> 文件，只写域名一行，例如 <code>test.yourdomain.com</code>。</p>
      <p>2. 域名 DNS 增加 CNAME 解析：<code>test -> marcuszuo.github.io</code>。</p>
      <p>3. 打开仓库 Pages 设置页填写 Custom domain 并勾选 Enforce HTTPS。</p>
      <p>4. 等待 DNS 生效后，用你的域名访问本站。</p>
      <p>仓库设置入口：<a href="https://github.com/marcuszuo/student-system/settings/pages" target="_blank" rel="noopener noreferrer">GitHub Pages Settings</a></p>
      <p><a href="./index.html">返回测评首页</a></p>
    </section>
  </main>
</body>
</html>
